; PlatformIO Project Configuration File
;
; Firmware do robo da competicao RC Romenia (Phoenix)
; Baseado no projeto bia-senna-code-2026, mas sem giroscopio/encoder
; e com sensores laterais removidos (nao existem no hardware novo).
; Ver codigo_romenia/PLANEJAMENTO.md para o planejamento completo.
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
monitor_speed = 115200
build_flags =
	-DDECODE_NEC=true
	-DSEND_NEC=true
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-I include
	-Wall
	-Wextra
framework = arduino
lib_deps =
	fastled/FastLED@3.6.0
	crankyoldgit/IRremoteESP8266@^2.8.6
